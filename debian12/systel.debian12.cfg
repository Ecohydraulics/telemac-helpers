# _____                              _______________________________
# ____/ TELEMAC Project Definitions /______________________________/
#
# DEPRECATED for TELEMAC v9.1.x and newer.
#
# Starting with v9.1, TELEMAC builds with CMake (driven by build_telemac.py)
# instead of the legacy `config.py` + `compile_telemac.py` flow that consumed
# this systel.cfg. The build no longer reads a hand-written systel.cfg; CMake
# GENERATES a minimal one inside the build directory (BUILD_DIR/systel.cfg),
# which the runtime tools (config.py, telemac2d.py, ...) then read.
#
# Dependencies are now located by CMake's find modules rather than by the
# include/library flags below:
#   * MPI / METIS / MUMPS  -> found automatically in /usr (Debian packages)
#   * MED                  -> found via the MED_ROOT prefix; Debian's libmed-dev
#                             omits med_parameter.hf and med.hf90, so the
#                             installer assembles a private prefix under
#                             <HOMETEL>/configs/med_root (system MED headers +
#                             libmed + the borrowed Fortran headers).
#   * HDF5                 -> pulled in transitively by libmed.
#
# Build/run on Debian 12:
#   source configs/pysource.debian12.sh   # sets HOMETEL, BUILD_DIR, MED_ROOT, ...
#   build_telemac.py --deps mpi mumps med -j "$(nproc)"
#   config.py                             # shows root, build dir and modules
#
# The block below is kept ONLY for reference / older TELEMAC versions (<= 9.0)
# and is NOT used by the v9.1.x CMake build.
#
[Configurations]
configs: hyinfompideb12
#
[general]
language: 2
modules:  system stbtel telemac2d telemac3d tomawac artemis gaia nestor khione waqtel postel3d hermes special
version:  9.1
options:  mpi dyn med
hash_char: #
sfx_zip:  .tar.gz
sfx_lib:  .a
sfx_obj:  .o
sfx_exe:
sfx_mod:  .mod
val_root:      <root>/examples
val_rank:      all
cc:      mpicc
cflags:  -fPIC -O3 -DHAVE_MED
fc:      mpifort
fflags:  -cpp -O3 -fPIC -fconvert=big-endian -frecord-marker=4 -DHAVE_MPI -DHAVE_MED
cmd_obj_c: [cc] [cflags] -c <srcName> -o <objName>
cmd_obj:   [fc] [fflags] -c <mods> <incs> <f95name>
cmd_lib:   ar crs <libname> <objs>
cmd_exe:   [fc] [fflags] -o <exename> <objs> <libs>
par_cmdexec:   <config>/partel < <partel.par> >> <partel.log>
mpi_cmdexec:   mpirun -np <ncsize> <exename>
inc_mpi:       -I /usr/lib/x86_64-linux-gnu/openmpi/include
inc_hdf5:      -I /usr/include/hdf5/serial
libs_hdf5:     -L /usr/lib/x86_64-linux-gnu/hdf5/serial -lhdf5_fortran -lhdf5hl_fortran -lhdf5_hl -lhdf5
inc_med:       -I <root>/configs/med_include -I /usr/include
libs_med:      -L /usr/lib/x86_64-linux-gnu -lmedC -lmed -lmedimport
inc_metis:     -I /usr/include
libs_metis:    -L /usr/lib/x86_64-linux-gnu -lmetis
inc_mumps:     -I /usr/include
libs_mumps:    -L /usr/lib/x86_64-linux-gnu -ldmumps -lmumps_common -lpord -lscalapack-openmpi -lblas -llapack
incs_all: [inc_mpi] [inc_hdf5] [inc_med] [inc_metis] [inc_mumps]
libs_all: [libs_med] [libs_hdf5] [libs_metis] [libs_mumps]
[hyinfompideb12]
brief: (DEPRECATED, v9.0 only) Debian 12 gfortran + OpenMPI + HDF5 + METIS + MUMPS/ScaLAPACK + MED
system: linux
mpi:   openmpi
compiler: gfortran
pyd_fcompiler: gnu95
f2py_name: f2py
bin_dir: <root>/builds/hyinfompideb12/bin
lib_dir: <root>/builds/hyinfompideb12/lib
obj_dir: <root>/builds/hyinfompideb12/obj
options: mpi dyn med
mods_all:  -I <config>
incs_all:  [inc_mpi] [inc_hdf5] [inc_med] [inc_metis] [inc_mumps]
libs_all:  [libs_med] [libs_hdf5] [libs_metis] [libs_mumps]

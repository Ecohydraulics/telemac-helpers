# _____                              _______________________________
# ____/ TELEMAC Project Definitions /______________________________/
#
# Reference configuration for Linux Mint 22 / Ubuntu 24.04 (noble), TELEMAC v9.1.x.
# This mirrors what telemac_ubuntu24_installer.sh generates.
#
# MED files (SALOME compatibility):
#   TELEMAC links the SYSTEM MED packages (libmedc-dev / libmed-dev /
#   libmedimport-dev), NOT the MED bundled in SALOME (different ABI -> the
#   runtime error HERMES_WRONG_MED_FORMAT_ERR). The system MED (libmedC) links
#   the OpenMPI HDF5, so HDF5 below is the openmpi build, not serial.
#
#   Ubuntu's libmed-dev is missing the Fortran header 'med_parameter.hf'.
#   Copy it (constants only, ABI-neutral) from a SALOME install into
#   <root>/configs/med_include, e.g.:
#     mkdir -p <HOMETEL>/configs/med_include
#     cp ~/opt/salome/BINARIES-UB24.04/medfile/include/med_parameter.hf \
#        <HOMETEL>/configs/med_include/
#
[Configurations]
configs: hyinfompiubu
#
# _____          _________________________________________________
# ____/ General /_________________________________________________/
#
[general]
language: 2
modules:  system stbtel telemac2d telemac3d tomawac artemis gaia nestor khione waqtel postel3d hermes special
version:  9.1
options:  mpi dyn med
hash_char: #
# Suffixes
sfx_zip:  .tar.gz
sfx_lib:  .a
sfx_obj:  .o
sfx_exe:
sfx_mod:  .mod
# Validation paths
val_root:      <root>/examples
val_rank:      all
# Compilers
cc:      mpicc
cflags:  -fPIC -O3 -DHAVE_MED
fc:      mpifort
# Core Fortran flags; TELEMAC expects big-endian unformatted files.
# -DHAVE_MED enables MED I/O in HERMES (use -DHAVE_MED -DHAVE_MED64 only if the
# system MED was built with a 64-bit med_int; Ubuntu/Mint ships 32-bit).
fflags:  -cpp -O3 -fPIC -fconvert=big-endian -frecord-marker=4 -DHAVE_MPI -DHAVE_MED
# Build commands ('ar crs' so the static archives carry a symbol index)
cmd_obj_c: [cc] [cflags] -c <srcName> -o <objName>
cmd_obj:   [fc] [fflags] -c <mods> <incs> <f95name>
cmd_lib:   ar crs <libname> <objs>
cmd_exe:   [fc] [fflags] -o <exename> <objs> <libs>
# Splitter and MPI run
par_cmdexec:   <config>/partel < <partel.par> >> <partel.log>
mpi_cmdexec:   mpirun -np <ncsize> <exename>
mpi_hosts:
# ----- Optional library blocks merged in libs_all / incs_all -----
# OpenMPI include dir (Ubuntu 24.04)
inc_mpi:       -I /usr/lib/x86_64-linux-gnu/openmpi/include
# HDF5 (OpenMPI build via libhdf5-openmpi-dev) - must match the HDF5 that the
# system MED library links against.
inc_hdf5:  -I /usr/include/hdf5/openmpi
libs_hdf5: -L /usr/lib/x86_64-linux-gnu/hdf5/openmpi -lhdf5_fortran -lhdf5hl_fortran -lhdf5_hl -lhdf5
ldflags_opt:   -Wl,-rpath,/usr/lib/x86_64-linux-gnu/hdf5/openmpi
ldflags_debug: -Wl,-rpath,/usr/lib/x86_64-linux-gnu/hdf5/openmpi

# MED (system packages; med_parameter.hf borrowed into <root>/configs/med_include)
inc_med:       -I <root>/configs/med_include -I /usr/include
libs_med:      -L /usr/lib/x86_64-linux-gnu -lmedC -lmed -lmedimport
# METIS
inc_metis:     -I /usr/include
libs_metis:    -L /usr/lib/x86_64-linux-gnu -lmetis
# MUMPS + ScaLAPACK (MPI build)
inc_mumps:     -I /usr/include
libs_mumps:    -L /usr/lib/x86_64-linux-gnu -ldmumps -lmumps_common -lpord -lscalapack-openmpi -lblas -llapack
# Aggregate include and library flags.
# NOTE: [libs_med] precedes [libs_hdf5] because libmedC references HDF5 symbols.
incs_all: [inc_mpi] [inc_hdf5] [inc_med] [inc_metis] [inc_mumps]
libs_all: [libs_med] [libs_hdf5] [libs_metis] [libs_mumps]
# ===== Build section =====
[hyinfompiubu]
brief: Linux Mint 22 / Ubuntu 24.04 gfortran + OpenMPI + HDF5 + METIS + MUMPS/ScaLAPACK + MED
system: linux
mpi:   openmpi
compiler: gfortran
pyd_fcompiler: gnu95
f2py_name: f2py
# build tree under <root>=HOMETEL (set by pysource.mint22.sh)
bin_dir: <root>/builds/hyinfompiubu/bin
lib_dir: <root>/builds/hyinfompiubu/lib
obj_dir: <root>/builds/hyinfompiubu/obj
# override/extend general flags if needed
options: mpi dyn med
cmd_obj:   [fc] [fflags] -c <mods> <incs> <f95name>
cmd_lib:   ar crs <libname> <objs>
cmd_exe:   [fc] [fflags] -o <exename> <objs> <libs>
# inherit mods_all/incs_all/libs_all from [general]
mods_all:  -I <config>
incs_all:  [inc_mpi] [inc_hdf5] [inc_med] [inc_metis] [inc_mumps]
libs_all:  [libs_med] [libs_hdf5] [libs_metis] [libs_mumps]
